<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雑貨屋 アイデアノート</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <span class="logo">🛍️</span>
        <div>
          <h1>アイデアノート</h1>
          <p class="subtitle">雑貨屋 アイデア管理</p>
        </div>
      </div>
      <div class="header-right">
        <div id="sync-status" class="sync-status">
          <span class="sync-dot" id="sync-dot"></span>
          <span id="sync-text">未接続</span>
        </div>
        <button id="auth-btn" class="btn btn-google" onclick="handleAuth()">
          <svg width="18" height="18" viewBox="0 0 18 18">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
            <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/>
          </svg>
          Googleでログイン
        </button>
        <button class="btn btn-secondary" onclick="manualBackup()">💾 バックアップ</button>
      </div>
    </header>

    <div class="toolbar">
      <button class="btn btn-primary" onclick="openModal()">＋ アイデアを追加</button>
      <div class="search-box">
        <span>🔍</span>
        <input type="text" id="search-input" placeholder="検索..." oninput="filterCards()" />
      </div>
      <div class="filter-group">
        <button class="filter-btn active" onclick="setFilter('all', this)">すべて</button>
        <button class="filter-btn" onclick="setFilter('未対応', this)">未対応</button>
        <button class="filter-btn" onclick="setFilter('対応中', this)">対応中</button>
        <button class="filter-btn" onclick="setFilter('完了', this)">完了</button>
      </div>
      <div id="stats-bar" class="stats"></div>
    </div>

    <div class="table-wrapper">
      <table id="idea-table">
        <thead>
          <tr>
            <th style="width:50px">#</th>
            <th>問題</th>
            <th>解決策</th>
            <th>効果</th>
            <th>Memo</th>
            <th style="width:110px">ステータス</th>
            <th style="width:100px">日付</th>
            <th style="width:80px">操作</th>
          </tr>
        </thead>
        <tbody id="idea-tbody"></tbody>
      </table>
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">💡</div>
        <p>アイデアがまだありません</p>
        <button class="btn btn-primary" onclick="openModal()">最初のアイデアを追加</button>
      </div>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">アイデアを追加</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>問題</label>
          <textarea id="input-problem" rows="3" placeholder="どんな問題がありますか？"></textarea>
        </div>
        <div class="form-group">
          <label>解決策</label>
          <textarea id="input-solution" rows="3" placeholder="どう解決しますか？"></textarea>
        </div>
        <div class="form-group">
          <label>効果</label>
          <textarea id="input-effect" rows="2" placeholder="どんな効果が期待できますか？"></textarea>
        </div>
        <div class="form-group">
          <label>Memo</label>
          <textarea id="input-memo" rows="2" placeholder="備考・メモ"></textarea>
        </div>
        <div class="form-group">
          <label>ステータス</label>
          <select id="input-status">
            <option value="未対応">未対応</option>
            <option value="対応中">対応中</option>
            <option value="完了">完了</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
        <button class="btn btn-primary" onclick="saveIdea()">保存</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
